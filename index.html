<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric J's Field Notes | AEMT Prep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quiz-container">
        <h1>Eric J's Field Notes</h1>
        <h2 style="text-align: center; color: #7f8c8d; font-weight: 400; margin-top: -10px;">AEMT Foundation Prep</h2>
        
        <div id="setup-area">
            <p style="text-align: center; margin-bottom: 30px;">Select a mode to begin your assessment of Chapters 1-6.</p>
            <button onclick="startQuiz('review')">Option 1: Review Mode (Instant Feedback)</button>
            <button onclick="startQuiz('exam')">Option 2: Exam Mode (Randomized)</button>
        </div>

        <div id="quiz-area" style="display:none;">
            <div id="progress"></div>
            <div id="question-text"></div>
            <div id="options-container"></div>
            <button id="action-btn" onclick="handleAction()">Submit Answer</button>
            <div id="feedback"></div>
        </div>

        <div id="results-area" style="display:none;">
            <h2>Assessment Complete</h2>
            <p id="score-display" style="font-size: 1.5rem; text-align: center; font-weight: bold;"></p>
            <button onclick="location.reload()">Restart Session</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
