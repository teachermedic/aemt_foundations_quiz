<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric J's Field Notes | AEMT Prep</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quiz-container">
        <h1>Eric J's Field Notes <span class="material-icons" style="font-size: 1.2em; color: var(--accent-blue);">health_and_safety</span></h1>
        <h2 class="subtitle">Foundations, Medical, & Trauma Prep</h2>
        
        <div id="setup-area">
            <p style="text-align: center; margin-bottom: 10px;">Customize your study session:</p>
            
            <div style="margin-bottom: 20px; text-align: center;">
                <label for="topic-select" style="font-weight: bold; display: block; margin-bottom: 8px;">Select Module:</label>
                <select id="topic-select" onchange="adjustSliderRange()" style="width: 95%; padding: 15px; border-radius: 10px; border: 2px solid var(--accent-blue); font-size: 1rem; cursor: pointer;">
    <option value="All">Comprehensive (All Content)</option>
    <option value="Foundations">Foundations (Chapters 1-6)</option>
    <option value="Pathophysiology">Pathophysiology (Chapter 7)</option>
    <option value="Medical">Medical Emergencies (Chapters 16-25)</option>
    <option value="Trauma">Trauma & Environmental (Chapters 26-34)</option>
</select>
            </div>

            <div id="slider-box">
                <label for="question-slider">
                    Questions: <span id="question-count-label">20</span>
                </label>
                <input type="range" id="question-slider" min="5" max="250" value="20" step="5" oninput="updateSliderLabel(this.value)">
                <p id="time-estimate">
                    <span class="material-icons" style="font-size: 1rem; vertical-align: middle;">schedule</span> 
                    Estimated Pacing: <span id="time-estimate-label">40</span> minutes
                </p>
            </div>

            <button class="mode-btn" onclick="startQuiz('review')">
                <span class="material-icons">menu_book</span> Option 1: Review Mode
            </button>
            <div style="height: 15px;"></div>
            <button class="mode-btn" onclick="startQuiz('exam')">
                <span class="material-icons">timer</span> Option 2: Exam Mode
            </button>
        </div>

        <div id="quiz-area" style="display:none;">
            <div id="timer-container">Time Remaining: <span id="timer-display">00:00</span></div>
            <div id="progress"></div>
            <div id="question-text"></div>
            <div id="options-container"></div>
            <button id="action-btn" onclick="handleAction()">Submit Answer</button>
            <div id="feedback"></div>
        </div>

        <div id="results-area" style="display:none;">
            <h2>Assessment Complete</h2>
            <div id="final-results-card">
                <p id="score-display"></p>
                <p id="percentage-display"></p>
                <div id="category-breakdown"></div>
                <p id="pass-status"></p>
            </div>
            <iframe src="https://ericjm.substack.com/embed" width="100%" height="320" style="margin-top:20px; border:1px solid #EEE; border-radius:12px;" frameborder="0" scrolling="no"></iframe>
            <button onclick="location.reload()" style="margin-top: 20px; background: var(--primary-blue);">New Session</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
